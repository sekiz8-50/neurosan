<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:var(--font-body);color:var(--fg1);background:var(--white)}
  body{padding:22px 26px}
  .meta{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-400);margin-bottom:14px}
  
  .row{display:flex;gap:24px}
  .col{display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{width:110px;height:62px;background:#fff;border-radius:8px}
  .lab{font-size:11px;color:var(--ink-500)}

</style></head><body>
  <div class="meta">Elevation — restrained, low-spread</div>
  <div class="row">
    <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lab">sm</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lab">md</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lab">lg</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-accent)"></div><div class="lab">accent</div></div>
  </div>
</body></html>
