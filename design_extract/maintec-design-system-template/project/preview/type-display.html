<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:var(--font-body);color:var(--fg1);background:var(--white)}
  body{padding:22px 26px}
  
  .spec{font-family:var(--font-display);text-transform:uppercase;letter-spacing:-.01em;line-height:.9;color:var(--black)}
  .big{font-size:64px}
  .row{display:flex;align-items:baseline;gap:14px;margin-top:8px}
  .meta{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-400)}

</style></head><body>
  <div class="meta">Display — Rift Bold · ALL CAPS ONLY</div>
  <div class="spec big" style="margin-top:10px">HALLO COLLEGA</div>
  <div class="row"><span class="spec" style="font-size:30px">JOIN THE <span style="color:var(--orange)">FUTURE TECHFORCE</span></span></div>
</body></html>
