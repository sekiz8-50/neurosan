<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:var(--font-body);color:var(--fg1);background:var(--white)}
  body{padding:22px 26px}
  
  .meta{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-400);margin-bottom:14px}
  .r{display:flex;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid var(--ink-100)}
  .r:last-child{border-bottom:0}
  .tag{font-family:var(--font-body);font-size:11px;color:var(--ink-400);width:78px;flex:none;letter-spacing:.04em}
  .sample{font-family:var(--font-display);text-transform:uppercase;color:var(--black);line-height:1}
  .sb{font-family:var(--font-body);color:var(--black);line-height:1}

</style></head><body>
  <div class="meta">Type Scale</div>
  <div class="r"><span class="tag">Display 80</span><span class="sample" style="font-size:46px">TECHFORCE</span></div>
  <div class="r"><span class="tag">H1 · 40</span><span class="sample" style="font-size:34px">HALLO COLLEGA</span></div>
  <div class="r"><span class="tag">H2 · 30</span><span class="sample" style="font-size:26px">VAKSPECIALIST</span></div>
  <div class="r"><span class="tag">Body · 16</span><span class="sb" style="font-size:16px">Word onderdeel van Maintec.</span></div>
  <div class="r"><span class="tag">Caption 12</span><span class="sb" style="font-size:12px;color:var(--ink-500)">WERKEN BIJ MAINTEC</span></div>
</body></html>
