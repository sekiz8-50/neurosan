<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:var(--font-body);color:var(--fg1);background:var(--white)}
  body{padding:22px 26px}
  .meta{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-400);margin-bottom:14px}
  
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .tag{font-size:11px;letter-spacing:.05em;text-transform:uppercase;padding:6px 12px;border-radius:999px}
  .t-orange{background:var(--orange);color:#fff}
  .t-dark{background:#000;color:#fff}
  .t-soft{background:var(--orange-100);color:var(--orange-700)}
  .t-out{border:1.3px solid var(--ink-200);color:var(--ink-500)}

</style></head><body>
  <div class="meta">Tags &amp; Badges</div>
  <div class="row">
    <span class="tag t-orange">Fulltime</span>
    <span class="tag t-dark">Techniek</span>
    <span class="tag t-soft">Nieuw</span>
    <span class="tag t-out">Regio Utrecht</span>
    <span class="tag t-out">40 uur</span>
  </div>
</body></html>
