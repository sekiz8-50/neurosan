<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:var(--font-body);color:var(--fg1);background:var(--white)}
  body{padding:22px 26px}
  .meta{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-400);margin-bottom:14px}
  
  .card{max-width:330px;border:1px solid var(--ink-200);border-radius:8px;overflow:hidden;background:#fff}
  .ph{height:96px;background:linear-gradient(135deg,#1c1c1d,#000);display:flex;align-items:flex-end;padding:12px}
  .badge{font-size:10px;text-transform:uppercase;letter-spacing:.06em;background:var(--orange);color:#fff;padding:4px 9px;border-radius:3px}
  .bd{padding:14px 16px 16px}
  .t{font-family:var(--font-display);text-transform:uppercase;font-size:20px;line-height:1;letter-spacing:-.01em}
  .s{font-size:12px;color:var(--ink-500);margin-top:7px}
  .ft{display:flex;gap:8px;margin-top:13px}
  .chip{font-size:10px;text-transform:uppercase;letter-spacing:.04em;border:1px solid var(--ink-200);color:var(--ink-500);padding:4px 9px;border-radius:999px}

</style></head><body>
  <div class="meta">Vacancy Card</div>
  <div class="card">
    <div class="ph"><span class="badge">Fulltime</span></div>
    <div class="bd"><div class="t">Monteur Zonnepanelen</div><div class="s">Word collega bij de Future Techforce.</div>
      <div class="ft"><span class="chip">Utrecht</span><span class="chip">38 uur</span></div>
    </div>
  </div>
</body></html>
