<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:var(--font-body);color:var(--fg1);background:var(--white)}
  body{padding:22px 26px}
  
  .meta{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-400);margin-bottom:10px}
  .museo{font-family:var(--font-logo);font-weight:900;font-size:54px;letter-spacing:-.02em;color:var(--black)}
  .note{font-size:13px;color:var(--ink-500);margin-top:8px;max-width:560px;line-height:1.5}

</style></head><body>
  <div class="meta">Logo Wordmark — Museo Sans 900</div>
  <div class="museo">MAINTEC</div>
