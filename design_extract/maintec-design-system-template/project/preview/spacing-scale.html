<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:var(--font-body);color:var(--fg1);background:var(--white)}
  body{padding:22px 26px}
  .meta{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-400);margin-bottom:14px}
  
  .row{display:flex;align-items:flex-end;gap:14px}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:var(--orange);width:100%}
  .lab{font-size:10px;color:var(--ink-400)}

</style></head><body>
  <div class="meta">Spacing — 4px base grid</div>
  <div class="row">
    <div class="col" style="width:34px"><div class="bar" style="height:4px"></div><div class="lab">1</div><div class="lab" style="color:var(--ink-300)">4</div></div><div class="col" style="width:34px"><div class="bar" style="height:8px"></div><div class="lab">2</div><div class="lab" style="color:var(--ink-300)">8</div></div><div class="col" style="width:34px"><div class="bar" style="height:12px"></div><div class="lab">3</div><div class="lab" style="color:var(--ink-300)">12</div></div><div class="col" style="width:34px"><div class="bar" style="height:16px"></div><div class="lab">4</div><div class="lab" style="color:var(--ink-300)">16</div></div><div class="col" style="width:34px"><div class="bar" style="height:24px"></div><div class="lab">5</div><div class="lab" style="color:var(--ink-300)">24</div></div><div class="col" style="width:34px"><div class="bar" style="height:32px"></div><div class="lab">6</div><div class="lab" style="color:var(--ink-300)">32</div></div><div class="col" style="width:34px"><div class="bar" style="height:48px"></div><div class="lab">7</div><div class="lab" style="color:var(--ink-300)">48</div></div><div class="col" style="width:34px"><div class="bar" style="height:64px"></div><div class="lab">8</div><div class="lab" style="color:var(--ink-300)">64</div></div>
  </div>
</body></html>
