<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;box-sizing:border-box}body{padding:22px 26px;font-family:sans-serif;background:#fff}
.meta{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#8a8a8b;margin-bottom:14px}
.row{display:flex;gap:18px;align-items:center}
.brk{font-family:'Arial Narrow',sans-serif;color:#FF7D2F;font-size:60px;font-weight:bold;line-height:1}
.lock{display:inline-flex;align-items:center;gap:10px;background:#000;padding:14px 18px;border-radius:4px}
.lock .b{color:#FF7D2F;font-size:30px;font-weight:bold;font-family:'Arial Narrow',sans-serif}
.lock .t{color:#fff;font-size:13px;letter-spacing:.08em;text-transform:uppercase;line-height:1.1}
.note{font-size:12px;color:#69696A;max-width:320px;line-height:1.5}
</style></head><body>
<div class="meta">Bracket device — "[ ]" containment mark</div>
<div class="row">
  <div class="lock"><span class="b">[</span><span class="t">The Future<br>Techforce</span><span class="b">]</span></div>
  <div class="note">Orange brackets frame the tagline and act as a standalone brand device for corners &amp; callouts.</div>
</div>
</body></html>
