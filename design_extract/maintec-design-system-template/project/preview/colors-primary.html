<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>

  body{padding:22px 26px}
  .meta{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-400);margin-bottom:14px}.row{display:flex;gap:14px}
</style></head><body>
  <div class="meta">Primary Palette — Orange · Black · White</div>

    <div style="flex:1"><div style="height:84px;border-radius:6px;background:#69696A;border:1px solid rgba(0,0,0,.08)"></div><div style="font-size:13px;font-weight:600;margin-top:8px;color:var(--black)">Dim Gray</div><div style="font-size:11px;color:var(--ink-400);letter-spacing:.03em">#69696A · support</div></div>
  </div>
