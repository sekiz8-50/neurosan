<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:var(--font-body);color:var(--fg1);background:var(--white)}
  body{padding:22px 26px}
  .meta{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-400);margin-bottom:14px}
  
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .btn{font-family:var(--font-body);font-size:13px;letter-spacing:.06em;text-transform:uppercase;font-weight:400;padding:13px 22px;border-radius:4px;border:0;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
  .btn-primary{background:var(--orange);color:#fff}
  .btn-primary:hover{background:var(--orange-600)}
  .btn-dark{background:#000;color:#fff}
  .btn-outline{background:transparent;color:#000;border:1.5px solid #000}
  .btn-ghost{background:transparent;color:var(--orange);padding-left:6px;padding-right:6px}
  .arr{font-size:15px}

</style></head><body>
  <div class="meta">Buttons</div>
  <div class="row">
    <button class="btn btn-primary">Solliciteer nu <span class="arr">→</span></button>
    <button class="btn btn-dark">Bekijk vacatures</button>
    <button class="btn btn-outline">Meer info</button>
    <button class="btn btn-ghost">Lees verder →</button>
  </div>
</body></html>
