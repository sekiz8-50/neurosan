<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:var(--font-body);color:var(--fg1);background:var(--white)}
  body{padding:22px 26px}
  .meta{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-400);margin-bottom:14px}
  
  .row{display:flex;gap:12px;align-items:center}
  .btn{font-family:var(--font-body);font-size:13px;letter-spacing:.06em;text-transform:uppercase;padding:13px 22px;border-radius:4px;border:0;color:#fff}
  .lab{font-size:10px;color:var(--ink-400);text-align:center;margin-top:6px;letter-spacing:.04em;text-transform:uppercase}
  .col{display:flex;flex-direction:column}

</style></head><body>
  <div class="meta">Button States — primary</div>
  <div class="row">
    <div class="col"><button class="btn" style="background:var(--orange-500)">Default</button><div class="lab">default</div></div>
    <div class="col"><button class="btn" style="background:var(--orange-600)">Hover</button><div class="lab">hover · darker</div></div>
    <div class="col"><button class="btn" style="background:var(--orange-700)">Press</button><div class="lab">press · deepest</div></div>
    <div class="col"><button class="btn" style="background:var(--ink-200);color:var(--ink-400)">Disabled</button><div class="lab">disabled</div></div>
  </div>
</body></html>
